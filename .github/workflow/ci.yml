name: Django CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: banking_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run migrations
        env:
          SECRET_KEY: github-actions-secret-key
          DEBUG: True
          DB_NAME: banking_db
          DB_USER: postgres
          DB_PASSWORD: postgres123
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          python manage.py migrate

      - name: Run tests
        env:
          SECRET_KEY: github-actions-secret-key
          DEBUG: True
          DB_NAME: banking_db
          DB_USER: postgres
          DB_PASSWORD: postgres123
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          python manage.py test