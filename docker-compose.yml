version: '3.9'

services:

  db:
    image: postgres:18
    container_name: postgres_db

    environment:
      POSTGRES_DB: banking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Krishna@042

    ports:
      - "5432:5432"

  web:
    build: .

    container_name: banking_app_container

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db