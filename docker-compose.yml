version: '3.9'

services:

  db:
    image: postgres:18
    container_name: postgres_db

    environment:
      POSTGRES_DB: banking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Krishna@042

    ports:
      - "5432:5432"

  web:
    build: .

    container_name: banking_app_container

    command: gunicorn banking_app.wsgi:application --bind 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db


  nginx:
    image: nginx:latest

    container_name: nginx_container

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - web