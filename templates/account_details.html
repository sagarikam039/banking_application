{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Account</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">

    <a class="navbar-brand fw-bold" href="{% url 'home' %}">
        MyBank
    </a>

    <div class="ms-auto">

        <a href="{% url 'transactions' %}" class="btn btn-light me-2">
            Transactions
        </a>

        <a href="{% url 'logout' %}" class="btn btn-danger">
            Logout
        </a>

    </div>

</nav>

<div class="page-container">

    <div class="app-card">

        <h1 class="mb-4">Account Details</h1>

        <div class="account-info">

            <p>
                <strong>Account Holder:</strong>
                {{ account.user.username }}
            </p>

            <p>
                <strong>Account Number:</strong>
                {{ account.account_number }}
            </p>

            <p>
                <strong>Balance:</strong>
                ${{ account.balance }}
            </p>

        </div>

        <div class="mt-4 text-center">

            <a href="{% url 'deposit' %}" class="btn btn-success me-2">
                Deposit
            </a>

            <a href="{% url 'withdraw' %}" class="btn btn-warning me-2">
                Withdraw
            </a>

            <a href="{% url 'transfer' %}" class="btn btn-primary">
                Transfer
            </a>

        </div>

    </div>

</div>

</body>
</html>
